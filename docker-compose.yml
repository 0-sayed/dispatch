services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dispatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-dispatch}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-15432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U $${POSTGRES_USER:-dispatch} -d $${POSTGRES_DB:-dispatch}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  pulsar:
    image: apachepulsar/pulsar:3.3.2
    command: ['bin/pulsar', 'standalone']
    ports:
      - '127.0.0.1:${PULSAR_PORT:-16650}:6650'
      - '127.0.0.1:${PULSAR_ADMIN_PORT:-18080}:8080'
    volumes:
      - pulsar-data:/pulsar/data
    healthcheck:
      test: ['CMD', 'bin/pulsar-admin', 'brokers', 'healthcheck']
      interval: 20s
      timeout: 10s
      retries: 10

volumes:
  postgres-data:
  pulsar-data:
