name: PR Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    name: PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Validate conventional PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._-]+\))?!?: .+'

          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must follow Conventional Commits, e.g. chore: scaffold project foundation"
            echo "Received: $PR_TITLE"
            exit 1
          fi

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          deny-licenses: GPL-3.0, AGPL-3.0

  merge-conflict:
    name: Merge Conflict
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check merge conflict with base branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"

          if ! git merge --no-commit --no-ff "origin/$BASE_REF"; then
            git merge --abort || true
            exit 1
          fi

          git merge --abort || true
